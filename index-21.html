function isScheduled(h,date){
  const created=(h.createdAt||"").split("T")[0];
  if(created&&date<created)return false;
  if(h.frequency==="daily")return true;
  if(h.frequency==="specific")return(h.days||[]).includes(new Date(date+"T00:00:00").getDay());
  return true;
}
function calcStreak(habit){
  let cur=0,best=0,streak=0,checking=true;
  let d=new Date();
  for(let i=0;i<365&&checking;i++){
    const ds=d.toISOString().split("T")[0];
    if(!isScheduled(habit,ds)){d.setDate(d.getDate()-1);continue;}
    if(habit.completions[ds]?.done){cur++;d.setDate(d.getDate()-1);}
    else if(i===0){d.setDate(d.getDate()-1);}
    else checking=false;
  }
  const sorted=Object.keys(habit.completions).sort();
  if(sorted.length){
    const start=new Date(sorted[0]+"T00:00:00");
    for(let dd=new Date(start);dd<=new Date();dd.setDate(dd.getDate()+1)){
      const ds=dd.toISOString().split("T")[0];
      if(!isScheduled(habit,ds))continue;
      if(habit.completions[ds]?.done){streak++;if(streak>best)best=streak;}
      else streak=0;
    }
  }
  return{cur,best};
}
function getRate(habit,days){
  const sc=days.filter(d=>isScheduled(habit,d));
  if(!sc.length)return 0;
  return Math.round((sc.filter(d=>habit.completions[d]?.done).length/sc.length)*100);
}

function detectCombo(habits,date){
  const doneCats=new Set(habits.filter(h=>isScheduled(h,date)&&h.completions[date]?.done).map(h=>h.category));
  for(const combo of COMBOS){if(combo.cats.every(c=>doneCats.has(c)))return combo;}
  return null;
}

function getWeeklyRecap(habits){
  const days=last7();
  let totalScheduled=0,totalDone=0;
  const habitRates=habits.map(h=>{
    const sched=days.filter(d=>isScheduled(h,d));
    const done=sched.filter(d=>h.completions[d]?.done).length;
    totalScheduled+=sched.length;totalDone+=done;
    return{h,rate:sched.length?Math.round((done/sched.length)*100):0,done,sched:sched.length};
  });
  const overallRate=totalScheduled?Math.round((totalDone/totalScheduled)*100):0;
  const best=[...habitRates].sort((a,b)=>b.rate-a.rate)[0];
  const worst=[...habitRates].sort((a,b)=>a.rate-b.rate)[0];
  const perfectDays=days.filter(d=>{const sc=habits.filter(h=>isScheduled(h,d));return sc.length>0&&sc.every(h=>h.completions[d]?.done);}).length;
  let moodTally={};
  days.forEach(d=>habits.forEach(h=>{const c=h.completions[d];if(c?.mood)moodTally[c.mood]=(moodTally[c.mood]||0)+1;}));
  const topMoodVal=Object.keys(moodTally).length?Object.entries(moodTally).sort((a,b)=>b[1]-a[1])[0][0]:null;
  return{overallRate,best,worst,perfectDays,totalDone,topMoodVal};
}

function computeGlobalStats(habits,extra={}){
  let total=0,moodLogs=0,notes=0,perfectDays=0,earlyBird=false;
  habits.forEach(h=>{Object.entries(h.completions).forEach(([date,c])=>{if(c.done){total++;if(c.completedAt){const hr=new Date(c.completedAt).getHours();if(hr<8)earlyBird=true;}}if(c.mood)moodLogs++;if(c.note&&c.note.trim())notes++;});});
  last90().forEach(d=>{const dh=habits.filter(x=>isScheduled(x,d));if(dh.length>0&&dh.every(x=>x.completions[d]?.done))perfectDays++;});
  return{total,moodLogs,notes,perfectDays,earlyBird,pomodoroSessions:extra.pomodoroSessions||0};
}

function useToast(){
  const[toasts,setToasts]=useState([]);
  const show=useCallback((msg,type="info")=>{const id=uid();setToasts(t=>[...t,{id,msg,type}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3200);},[]);
  return{toasts,show};
}

function useVoice(habits,onToggle,show,lang){
  const[listening,setListening]=useState(false);
  const recRef=useRef(null);
  const refs=useRef({habits,onToggle,show,lang});
  useEffect(()=>{refs.current={habits,onToggle,show,lang};},[habits,onToggle,show,lang]);
  const matchHabit=(text)=>{
    const lower=text.toLowerCase();let best=null,bestScore=0;
    refs.current.habits.forEach(h=>{const name=h.name.toLowerCase();let score=0;if(lower.includes(name))score=100;else name.split(" ").forEach(w=>{if(w.length>2&&lower.includes(w))score+=20;});if(score>bestScore){bestScore=score;best=h;}});
    return bestScore>0?best:null;
  };
  const start=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){refs.current.show(refs.current.lang==="ur"?"Voice support nahi hai":"Voice not supported","error");return;}
    const rec=new SR();
    rec.lang=refs.current.lang==="ur"?"ur-PK":"en-US";rec.interimResults=false;rec.maxAlternatives=1;
    rec.onstart=()=>setListening(true);rec.onerror=()=>{setListening(false);refs.current.show("Couldn't understand, try again","error");};rec.onend=()=>setListening(false);
    rec.onresult=(e)=>{const text=e.results[0][0].transcript;const habit=matchHabit(text);if(habit){refs.current.onToggle(habit.id,todayStr());refs.current.show(`🎤 ${habit.emoji} ${habit.name} completed!`,"success");}else refs.current.show(`No habit matched "${text}"`,"error");};
    rec.start();recRef.current=rec;
  };
  const stop=()=>{recRef.current?.stop();setListening(false);};
  const toggleListen=()=>{listening?stop():start();};
  return{listening,toggleListen};
}

function Heatmap({habits}){
  const days=last90();
  const intensity=(d)=>{const h=habits.filter(x=>isScheduled(x,d));if(!h.length)return 0;return h.filter(x=>x.completions[d]?.done).length/h.length;};
  const weeks=[];for(let i=0;i<days.length;i+=7)weeks.push(days.slice(i,i+7));
  return(<div style={{display:"flex",gap:3,overflowX:"auto",paddingBottom:4}}>{weeks.map((week,wi)=>(<div key={wi} style={{display:"flex",flexDirection:"column",gap:3}}>{week.map(d=>{const p=intensity(d);return<div key={d} title={`${fmtShort(d)}: ${Math.round(p*100)}%`} style={{width:10,height:10,borderRadius:2,background:p===0?"var(--bg4)":p<0.34?hex2a("#6C63FF",0.35):p<0.67?hex2a("#6C63FF",0.65):"#6C63FF",transition:"background 0.3s"}}/>;})}</div>))}</div>);
}

function PomodoroModal({onClose,settings,onSessionComplete}){
  const WORK=(settings?.work||25)*60,REST=(settings?.rest||5)*60;
  const[phase,setPhase]=useState("work"),[sec,setSec]=useState(WORK),[running,setRunning]=useState(false),[sessions,setSessions]=useState(0),[task,setTask]=useState("");
  const ref=useRef(null);
  useEffect(()=>{
    if(running){ref.current=setInterval(()=>{setSec(s=>{if(s<=1){clearInterval(ref.current);setRunning(false);if(phase==="work"){setSessions(n=>{const nn=n+1;onSessionComplete(nn);return nn;});setPhase("rest");setSec(REST);}else{setPhase("work");setSec(WORK);}return 0;}return s-1;});},1000);}
    return()=>clearInterval(ref.current);
  },[running,phase]);
  const mm=String(Math.floor(sec/60)).padStart(2,"0"),ss2=String(sec%60).padStart(2,"0");
  const total=phase==="work"?WORK:REST,pct=Math.round(((total-sec)/total)*100),col=phase==="work"?"#6C63FF":"#34D399";
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",backdropFilter:"blur(10px)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{...S.card,padding:28,maxWidth:340,width:"100%",borderRadius:24,textAlign:"center"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <span style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:"1.1rem"}}>🍅 Pomodoro</span>
          <button onClick={onClose} style={{...S.btn,background:"var(--bg3)",border:"1px solid var(--bdr)",borderRadius:8,padding:"6px 10px",color:"var(--t1)"}}>✕</button>
        </div>
        <input value={task} onChange={e=>setTask(e.target.value)} placeholder="What are you working on? (optional)" style={{...S.inp,marginBottom:16,textAlign:"center",fontSize:"0.875rem"}} onFocus={e=>e.target.style.borderColor="#6C63FF"} onBlur={e=>e.target.style.borderColor="var(--bdr)"}/>
        <div style={{display:"flex",justifyContent:"center",marginBottom:20}}>
          <Ring pct={pct} color={col} size={160} stroke={10}>
            <div><div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:"2.6rem",fontWeight:700,color:col,lineHeight:1}}>{mm}:{ss2}</div><div style={{fontSize:"0.78rem",color:"var(--t2)",fontWeight:600,textTransform:"uppercase",marginTop:4}}>{phase==="work"?"Focus Time":"Break Time"}</div></div>
          </Ring>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:16,justifyContent:"center"}}>
          {[["work","🧠 Focus"],["rest","☕ Break"]].map(([p,l])=>(<button key={p} onClick={()=>{setPhase(p);setSec(p==="work"?WORK:REST);setRunning(false);}} style={{...S.btn,padding:"8px 18px",borderRadius:10,background:phase===p?col:"var(--bg3)",color:phase===p?"white":"var(--t2)",border:`1px solid ${phase===p?col:"var(--bdr)"}`,fontSize:"0.85rem",fontWeight:700}}>{l}</button>))}
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:18}}>
          <button onClick={()=>setRunning(r=>!r)} style={{...S.btn,flex:1,padding:"14px",borderRadius:12,background:col,color:"white",fontSize:"1rem",fontWeight:700}}>{running?"⏸ Pause":"▶ Start"}</button>
          <button onClick={()=>{setRunning(false);setSec(phase==="work"?WORK:REST);}} style={{...S.btn,padding:"14px 18px",borderRadius:12,background:"var(--bg3)",border:"1px solid var(--bdr)",color:"var(--t2)",fontSize:"1rem"}}>↺</button>
        </div>
        <div style={{fontSize:"0.78rem",color:"var(--t2)"}}>Sessions today: <strong style={{color:"var(--t1)"}}>{sessions}</strong></div>
      </div>
    </div>
  );
}

function HabitDNA({habits}){
  const cats=CATS.map(cat=>{const h=habits.filter(x=>x.category===cat);if(!h.length)return null;return{cat,score:Math.round(h.reduce((a,x)=>a+getRate(x,last30()),0)/h.length)};}).filter(Boolean);
  if(cats.length<3)return null;
  const size=220,cx=size/2,cy=size/2,maxR=80,n=cats.length;
  const angle=(i)=>(Math.PI*2*i)/n-Math.PI/2;
  const pointAt=(i,r)=>({x:cx+r*Math.cos(angle(i)),y:cy+r*Math.sin(angle(i))});
  const dataPoints=cats.map((c,i)=>pointAt(i,(c.score/100)*maxR));
  const pathD=dataPoints.map((p,i)=>`${i===0?"M":"L"}${p.x},${p.y}`).join(" ")+"Z";
  return(<div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
    <svg width={size} height={size}>
      {[0.25,0.5,0.75,1].map((r,ri)=>{const pts=cats.map((_,i)=>pointAt(i,r*maxR));const d=pts.map((p,i)=>`${i===0?"M":"L"}${p.x},${p.y}`).join(" ")+"Z";return<path key={ri} d={d} fill="none" stroke="var(--bdr)" strokeWidth={1}/>;} )}
      {cats.map((_,i)=>{const p=pointAt(i,maxR);return<line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="var(--bdr)" strokeWidth={1}/>;})}
      <path d={pathD} fill="#6C63FF33" stroke="#6C63FF" strokeWidth={2.5}/>
      {dataPoints.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r={4} fill="#6C63FF"/>)}
      {cats.map((c,i)=>{const p=pointAt(i,maxR+22);return<text key={i} x={p.x} y={p.y} fontSize={10} fontWeight={700} fill="var(--t2)" textAnchor="middle" dominantBaseline="middle">{c.cat}</text>;})}
    </svg>
    <div style={{display:"flex",gap:14,flexWrap:"wrap",justifyContent:"center",marginTop:8}}>
      {cats.map(c=><div key={c.cat} style={{fontSize:"0.7rem",color:"var(--t2)",display:"flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,borderRadius:2,background:"#6C63FF"}}/>{c.cat}: <strong style={{color:"var(--t1)"}}>{c.score}%</strong></div>)}
    </div>
  </div>);
}

  const quote=QUOTES[new Date().getDay()%QUOTES.length];
  const greet=pct===100?t.allDone:pct>=75?t.almostThere:pct>=50?t.halfway:pct>=25?t.keepGoing:t.letsGo;
  const sorted=[...todayH].filter(h=>filter==="all"||(filter==="pending"&&!h.completions[td]?.done)||(filter==="done"&&h.completions[td]?.done)).sort((a,b)=>{const da=a.completions[td]?.done?1:0,db=b.completions[td]?.done?1:0;if(da!==db)return da-db;return({"high":0,"medium":1,"low":2}[a.priority||"medium"])-({"high":0,"medium":1,"low":2}[b.priority||"medium"]);});
  return(
    <div style={{padding:"0 16px 100px"}}>
      <div style={{paddingTop:20,marginBottom:14}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
          <div><p style={{fontSize:"0.78rem",color:"var(--t2)",fontWeight:600,marginBottom:3}}>{fmtFull(todayStr())}</p><h1 style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:"1.75rem",fontWeight:700,lineHeight:1.1}}>{greet}</h1></div>
          <div style={{display:"flex",gap:6,marginTop:4}}>
            <button onClick={onRecap} style={{...S.btn,background:"var(--bg2)",border:"1px solid var(--bdr)",borderRadius:10,padding:"7px 10px",color:"var(--t1)",fontSize:"0.78rem",fontWeight:700}}>📊</button>
            <button onClick={onToggleLang} style={{...S.btn,background:"var(--bg2)",border:"1px solid var(--bdr)",borderRadius:10,padding:"7px 10px",color:"var(--t1)",fontSize:"0.72rem",fontWeight:700}}>{lang==="ur"?"EN":"اردو"}</button>
            <button onClick={onPomodoro} style={{...S.btn,background:"var(--bg2)",border:"1px solid var(--bdr)",borderRadius:10,padding:"7px 11px",color:"var(--t1)",fontSize:"0.75rem",fontWeight:700}}>🍅</button>
          </div>
        </div>
        <div style={{marginTop:10,padding:"10px 14px",background:"var(--bg2)",border:"1px solid var(--bdr)",borderRadius:12,fontSize:"0.78rem",color:"var(--t2)",fontStyle:"italic"}}>{quote}</div>
      </div>
      {todayH.length>0&&(<div style={{...S.card,padding:18,marginBottom:14,borderRadius:20}}><div style={{display:"flex",alignItems:"center",gap:16}}>
        <Ring pct={pct} color={pct===100?"#34D399":"#6C63FF"} size={72} stroke={7}><span style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:"1rem",color:pct===100?"#34D399":"#6C63FF"}}>{pct}%</span></Ring>
        <div style={{flex:1}}>
          <div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:"1.4rem",fontWeight:700}}>{done}<span style={{fontSize:"0.95rem",color:"var(--t2)",fontWeight:500}}> / {todayH.length}</span></div>
          <div style={{display:"flex",gap:3,marginTop:8}}>{last7().map(d=>{const h2=habits.filter(x=>isScheduled(x,d));const p=h2.length>0?h2.filter(x=>x.completions[d]?.done).length/h2.length:0;return<div key={d} style={{flex:1,height:7,borderRadius:4,background:p===0?"var(--bg4)":p<0.5?"#6C63FF55":p<1?"#6C63FFaa":"#6C63FF",transition:"background 0.3s"}}/>;} )}</div>
          <div style={{fontSize:"0.67rem",color:"var(--t3)",marginTop:4}}>7-day activity</div>
        </div>
      </div></div>)}
      <div style={{marginBottom:12}}><WaterWidget water={water} onUpdate={onWater} t={t}/></div>
      {todayH.length>0&&(<div style={{display:"flex",gap:7,marginBottom:12}}>{[["all",t.all],["pending",t.pending],["done",t.done]].map(([v,l])=>(<button key={v} onClick={()=>setFilter(v)} style={{...S.btn,padding:"6px 14px",borderRadius:999,fontSize:"0.78rem",fontWeight:700,border:`1px solid ${filter===v?"#6C63FF":"var(--bdr)"}`,background:filter===v?"#6C63FF":"var(--bg2)",color:filter===v?"white":"var(--t2)"}}>{l}</button>))}</div>)}
      {sorted.length===0?(
        <div style={{textAlign:"center",padding:"52px 0"}}>
          <div style={{fontSize:"3rem",marginBottom:12}}>{todayH.length===0?"✨":"🎉"}</div>
          <div style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:"1.1rem",marginBottom:8}}>{todayH.length===0?t.noHabitsYet:pct===100?t.allDone:"..."}</div>
          <p style={{color:"var(--t2)",fontSize:"0.875rem",marginBottom:20}}>{todayH.length===0?t.tapToAdd:""}</p>
          {todayH.length===0&&<button onClick={onAdd} style={{...S.btn,background:"#6C63FF",color:"white",borderRadius:12,padding:"12px 28px",fontSize:"1rem",fontWeight:700}}>{t.addFirstHabit}</button>}
        </div>
      ):(<div style={{display:"flex",flexDirection:"column",gap:10}}>{sorted.map(h=><HabitCard key={h.id} habit={h} onToggle={onToggle} onEdit={onEdit} onArchive={onArchive} onDelete={onDelete} onDetail={onDetail}/>)}</div>)}
      {habits.length>0&&(<div style={{marginTop:16}}><ReflectionWidget reflections={reflections} onSave={onReflection} t={t}/></div>)}
      <button onClick={onVoice} style={{...S.btn,position:"fixed",bottom:88,right:84,width:48,height:48,borderRadius:"50%",background:listening?"#F87171":"var(--bg2)",border:listening?"none":"1px solid var(--bdr)",color:listening?"white":"var(--t1)",boxShadow:listening?"0 0 0 6px rgba(248,113,113,0.25)":"var(--shadow)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.2rem",zIndex:90,transition:"all 0.2s"}}>{listening?"🔴":"🎤"}</button>
      <button onClick={onAdd} style={{...S.btn,position:"fixed",bottom:88,right:20,width:56,height:56,borderRadius:"50%",background:"#6C63FF",color:"white",boxShadow:"0 4px 22px rgba(108,99,255,0.55)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.5rem",zIndex:90}}>+</button>
    </div>
  );
}

function App(){
  const[state,setState]=useState(()=>loadData());
  const[tab,setTab]=useState("today");
  const[showForm,setShowForm]=useState(false),[editing,setEditing]=useState(null),[detail,setDetail]=useState(null),[showPomo,setShowPomo]=useState(false),[showRecap,setShowRecap]=useState(false);
  const{toasts,show}=useToast();

  useEffect(()=>{saveData(state);},[state]);
  useEffect(()=>{document.documentElement.setAttribute("data-theme",state.theme);},[state.theme]);
  useEffect(()=>{
    const active=state.habits.filter(h=>!h.archived);
    const stats={...computeGlobalStats(active),pomodoroSessions:state.pomodoroSessions||0};
    const newB=BADGES.filter(b=>!(state.earnedBadges||[]).includes(b.id)&&b.check(active,stats)).map(b=>b.id);
    if(newB.length>0){show("🏆 "+newB.map(id=>BADGES.find(b=>b.id===id)?.icon+" "+BADGES.find(b=>b.id===id)?.name).join(", "),"success");setState(s=>({...s,earnedBadges:[...(s.earnedBadges||[]),...newB]}));}
  },[state.habits,state.pomodoroSessions]);

  const habits=state.habits.filter(h=>!h.archived);
  const setH=fn=>setState(s=>({...s,habits:fn(s.habits)}));
  const addHabit=d=>{setH(h=>[...h,{...d,id:uid(),createdAt:new Date().toISOString(),completions:{},archived:false}]);show("✨ Habit added!","success");setShowForm(false);};
  const editHabit=d=>{setH(h=>h.map(x=>x.id===editing.id?{...x,...d}:x));show("✓ Updated!","success");setShowForm(false);setEditing(null);};
  const delHabit=id=>{setH(h=>h.filter(x=>x.id!==id));show("Deleted");};
  const archiveH=id=>{setH(h=>h.map(x=>x.id===id?{...x,archived:true}:x));show("📦 Archived");};
  const toggle=(id,date)=>{
    setH(h=>{
      const updated=h.map(x=>{if(x.id!==id)return x;const dn=!x.completions[date]?.done;return{...x,completions:{...x.completions,[date]:{...x.completions[date],date,done:dn,completedAt:dn?new Date().toISOString():undefined}}};});
      const target=updated.find(x=>x.id===id),isDone=target?.completions[date]?.done;
      if(isDone){const combo=detectCombo(updated.filter(x=>!x.archived),date);if(combo)show(`${combo.icon} ${(state.lang||"en")==="ur"?combo.msgUr:combo.msg}`,"success");else show("🔥 Done!","success");}
      return updated;
    });
  };
  const voice=useVoice(habits,toggle,show,state.lang||"en");
  const updComp=(id,date,upd)=>{setH(h=>h.map(x=>x.id!==id?x:{...x,completions:{...x.completions,[date]:{...x.completions[date],date,...upd}}}));};
  const updWater=cups=>setState(s=>({...s,water:{...(s.water||{}),[todayStr()]:cups}}));
  const updWeight=(date,val)=>setState(s=>({...s,weightLog:{...(s.weightLog||{}),[date]:val}}));
  const updReflection=(date,text)=>setState(s=>({...s,dailyReflections:{...(s.dailyReflections||{}),[date]:text}}));
  const addNote=(text)=>setState(s=>({...s,notes:[...(s.notes||[]),{id:uid(),text,createdAt:todayStr(),completions:{}}]}));
  const toggleNoteDay=(id,date)=>setState(s=>({...s,notes:(s.notes||[]).map(n=>n.id!==id?n:{...n,completions:{...n.completions,[date]:!n.completions[date]}})}));
  const deleteNote=(id)=>setState(s=>({...s,notes:(s.notes||[]).filter(n=>n.id!==id)}));
  const detailFresh=detail?habits.find(h=>h.id===detail.id)||null:null;
  const t=useT(state.lang||"en");
  const TABS=[{id:"today",icon:"🏠",label:t.today},{id:"notes",icon:"📝",label:t.notes},{id:"calendar",icon:"📅",label:t.calendar},{id:"stats",icon:"📊",label:t.stats},{id:"weight",icon:"⚖️",label:t.weight},{id:"badges",icon:"🏆",label:t.badges},{id:"settings",icon:"⚙️",label:t.more}];
  const cp={onToggle:toggle,onEdit:h=>{setEditing(h);setShowForm(true);},onArchive:archiveH,onDelete:delHabit,onDetail:h=>setDetail(habits.find(x=>x.id===h.id)||h),onAdd:()=>{setEditing(null);setShowForm(true);}};

  return(<>
    <style>{`
      [data-theme="dark"]{--bg1:#0F0F1A;--bg2:#161624;--bg3:#1E1E30;--bg4:#252538;--bdr:rgba(255,255,255,0.08);--t1:#F0F0FF;--t2:#9090C0;--t3:#5050A0;--shadow:0 4px 24px rgba(0,0,0,0.4)}
      [data-theme="light"]{--bg1:#F0F0FF;--bg2:#FFFFFF;--bg3:#EBEBFF;--bg4:#DCDCF5;--bdr:rgba(0,0,0,0.08);--t1:#0F0F2A;--t2:#5050A0;--t3:#9090C0;--shadow:0 4px 24px rgba(108,99,255,0.1)}
      body{background:var(--bg1);color:var(--t1);transition:background 0.3s,color 0.3s}
      textarea,input,select{font-family:inherit;color:var(--t1)}
      button:focus-visible{outline:2px solid #6C63FF;outline-offset:2px}
      @keyframes spin{to{transform:rotate(360deg)}}
    `}</style>
    <main style={{flex:1,overflowY:"auto",paddingTop:"env(safe-area-inset-top)"}}>
      {tab==="today"&&<TodayScreen habits={habits} {...cp} water={state.water||{}} onWater={updWater} onPomodoro={()=>setShowPomo(true)} reflections={state.dailyReflections||{}} onReflection={updReflection} lang={state.lang||"en"} onToggleLang={()=>setState(s=>({...s,lang:(s.lang||"en")==="en"?"ur":"en"}))} onRecap={()=>setShowRecap(true)} onVoice={voice.toggleListen} listening={voice.listening}/>}
      {tab==="notes"&&<NotesScreen notesList={state.notes||[]} onAdd={addNote} onToggleDay={toggleNoteDay} onDelete={deleteNote} lang={state.lang||"en"}/>}
      {tab==="calendar"&&<CalendarScreen habits={habits}/>}
      {tab==="stats"&&<StatsScreen habits={habits}/>}
      {tab==="weight"&&<WeightScreen weightLog={state.weightLog||{}} onUpdate={updWeight}/>}
      {tab==="badges"&&<BadgesScreen habits={habits} earnedBadges={state.earnedBadges||[]} pomodoroSessions={state.pomodoroSessions||0}/>}
      {tab==="settings"&&<SettingsScreen habits={habits} theme={state.theme} onToggleTheme={()=>setState(s=>({...s,theme:s.theme==="dark"?"light":"dark"}))} onImport={h=>setState(s=>({...s,habits:[...s.habits,...h.filter(n=>!s.habits.find(x=>x.id===n.id))]}))} onDeleteAll={()=>{setState(s=>({...s,habits:[],earnedBadges:[],water:{},weightLog:{},dailyReflections:{},pomodoroSessions:0,notes:[]}));show("All data cleared");}} pomodoroSettings={state.pomodoroSettings||{work:25,rest:5}} onPomodoroSettings={ps=>setState(s=>({...s,pomodoroSettings:ps}))} lang={state.lang||"en"} onToggleLang={()=>setState(s=>({...s,lang:(s.lang||"en")==="en"?"ur":"en"}))}/>}
    </main>
    <nav style={{position:"fixed",bottom:0,left:0,right:0,background:"var(--bg2)",borderTop:"1px solid var(--bdr)",display:"flex",zIndex:100,paddingBottom:"env(safe-area-inset-bottom)"}}>
      {TABS.map(tb=>(<button key={tb.id} onClick={()=>setTab(tb.id)} style={{...S.btn,flex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"9px 2px",gap:2,color:tab===tb.id?"#6C63FF":"var(--t3)",fontSize:"0.58rem",fontWeight:700,letterSpacing:"0.02em",transition:"color 0.2s"}}><span style={{fontSize:"1.15rem",lineHeight:1,transition:"transform 0.2s",transform:tab===tb.id?"scale(1.18)":"scale(1)"}}>{tb.icon}</span>{tb.label}</button>))}
    </nav>
    <div style={{position:"fixed",bottom:84,left:"50%",transform:"translateX(-50%)",zIndex:999,display:"flex",flexDirection:"column",gap:8,pointerEvents:"none",alignItems:"center"}}>
      {toasts.map(t=>(<div key={t.id} style={{background:"var(--bg3)",border:`1px solid ${t.type==="success"?"#34D39944":"var(--bdr)"}`,color:t.type==="error"?"#F87171":"var(--t1)",borderRadius:12,padding:"11px 22px",fontWeight:600,fontSize:"0.875rem",boxShadow:"var(--shadow)",whiteSpace:"nowrap"}}>{t.msg}</div>))}
    </div>
    {showPomo&&<PomodoroModal onClose={()=>setShowPomo(false)} settings={state.pomodoroSettings} onSessionComplete={n=>setState(s=>({...s,pomodoroSessions:(s.pomodoroSessions||0)+1}))}/>}
    {showRecap&&<WeeklyRecapCard habits={habits} lang={state.lang||"en"} onClose={()=>setShowRecap(false)}/>}
    {showForm&&<HabitForm habit={editing} onSave={editing?editHabit:addHabit} onClose={()=>{setShowForm(false);setEditing(null);}} lang={state.lang||"en"}/>}
    {detailFresh&&<HabitDetail habit={detailFresh} onClose={()=>setDetail(null)} onUpdate={updComp} onToggle={toggle} lang={state.lang||"en"}/>}
  </>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
